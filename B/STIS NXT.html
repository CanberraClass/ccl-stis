<html>

        </div>

      </div>
      <div class="flex items-center justify-between text-white" style="padding: 112px 12px; gap: 10px; border-bottom-width: medium; border-bottom-style: none; border-bottom-color: currentcolor;">

          <span data-fit-line="true" class="whitespace-nowrap" style="font-size: 72px; font-weight: 400;">Clockwise</span>

        </div>

      </div>
    </div>
    <div class="flex items-center" style="padding: 8px 12px; border-top: 2px solid rgb(51, 51, 51);">
      <span class="text-white" style="font-size: 40px;">2026-07-15</span>
      <div class="flex flex-1 items-center"><div aria-hidden="true" style="width: 6px; flex-shrink: 0;">

      <div class="overflow-hidden flex-1">
        <div class="whitespace-nowrap text-white text-center" style="font-size: 40px;">Dhoby Ghaut 1min</div>
